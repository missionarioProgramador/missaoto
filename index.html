    <title>Partido Missão Tocantins</title>

    <meta name="description" content="Conheça o diretório estadual do Partido Missão no Tocantins. Acompanhe nossos candidatos a Governador, Deputado Federal e Deputado Estadual para as próximas eleições.">
    <meta name="keywords" content="Partido Missão Tocantins, candidatos deputado federal tocantins, candidatos deputado estadual tocantins, candidato governo tocantins 2026, eleições tocantins, partido missão">
    <meta name="robots" content="index, follow">
    <base href="/missaoto/">
    <script>
        (function () {
            const baseEl = document.querySelector('base');
            const inSubPath = window.location.pathname.includes('/missaoto/');
            baseEl.setAttribute('href', inSubPath ? '/missaoto/' : '/');
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'missao-yellow': '#fcbd27', 'missao-dark': '#111111' },
                    fontFamily: { 'afacad': ['Afacad', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html { scroll-padding-top: 90px; }
        body { background-color: #111111; color: #ffffff; }
    </style>
</head>
<body class="font-afacad antialiased">

    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20 px-6">
        <div id="hero-placeholder"></div>
        <div id="quem-somos-placeholder"></div>

        <!-- Valores Section -->
        <section class="container mx-auto max-w-5xl mb-24">
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-bold mb-4 text-gray-100">
                    Nossos <span class="text-missao-yellow">Valores</span>
                </h2>
                <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                    Princípios que guiam nossas ações e compromissos
                </p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 hover:border-missao-yellow transition-colors duration-300">
                    <div class="w-12 h-12 bg-missao-yellow/20 rounded-lg mb-4 flex items-center justify-center">
                        <svg class="w-6 h-6 text-missao-yellow" fill="currentColor" viewBox="0 0 20 20">

                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-100 mb-2">Ética</h3>
                    <p class="text-gray-400 text-sm">Integridade em todas as nossas ações</p>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 hover:border-missao-yellow transition-colors duration-300">
                    <div class="w-12 h-12 bg-missao-yellow/20 rounded-lg mb-4 flex items-center justify-center">
                        <svg class="w-6 h-6 text-missao-yellow" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M3 2a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-100 mb-2">Transparência</h3>
                    <p class="text-gray-400 text-sm">Clareza em nossas decisões e gestão</p>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 hover:border-missao-yellow transition-colors duration-300">
                    <div class="w-12 h-12 bg-missao-yellow/20 rounded-lg mb-4 flex items-center justify-center">
                        <svg class="w-6 h-6 text-missao-yellow" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v2h8v-2zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-2a4 4 0 00-8 0v2a2 2 0 002 2h4a2 2 0 002-2z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-100 mb-2">Inclusão</h3>
                    <p class="text-gray-400 text-sm">Respeito à diversidade e pluralismo</p>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 hover:border-missao-yellow transition-colors duration-300">
                    <div class="w-12 h-12 bg-missao-yellow/20 rounded-lg mb-4 flex items-center justify-center">
                        <svg class="w-6 h-6 text-missao-yellow" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-100 mb-2">Sustentabilidade</h3>
                    <p class="text-gray-400 text-sm">Compromisso com o futuro do planeta</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const APP_ROOT = window.location.pathname.includes('/missaoto/') ? '/missaoto/' : '/';

        const loadComponent = (id, path) => {
            const normalizedPath = path.replace(/^\/+/, '');
            const resolvedPath = `${APP_ROOT}${normalizedPath}`;

            fetch(resolvedPath)
                .then(response => {
                    if (!response.ok) throw new Error(`Erro ao carregar ${resolvedPath}`);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                    if(id === 'header-placeholder') initMobileMenu();
                    if(id === 'hero-placeholder') initTypewriter();
                })
                .catch(error => console.error('Erro:', error));
        };

        const initMobileMenu = () => {
            const hamburger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobile-menu');

            if (hamburger && mobileMenu) {
                hamburger.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });

                const mobileLinks = mobileMenu.querySelectorAll('a');
                mobileLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenu.classList.add('hidden');
                    });
                });
            }
        };

        const initTypewriter = () => {
            const typewriterEl = document.getElementById('typewriter');
            
            if (!typewriterEl) {
                console.error('Elemento typewriter não encontrado');
                return;
            }
            
            const words = ['Brasil', 'Tocantins'];
            let wordIndex = 0;
            let charIndex = 0;
            let isDeleting = false;

            function type() {
                const currentWord = words[wordIndex];
                
                if (isDeleting) {
                    charIndex--;
                } else {
                    charIndex++;
                }

                typewriterEl.textContent = currentWord.slice(0, charIndex);

                let delay = 150;

                if (isDeleting) {
                    delay = 100;
                }

                if (charIndex === currentWord.length && !isDeleting) {
                    delay = 2500;
                    isDeleting = true;
                } else if (charIndex === 0 && isDeleting) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    delay = 500;
                }

                setTimeout(type, delay);
            }

            setTimeout(type, 500);
        };

        // Carregar componentes
        loadComponent('header-placeholder', 'html/layout/header.html');
        loadComponent('footer-placeholder', 'html/layout/footer.html');
        loadComponent('hero-placeholder', 'html/hero.html');
        loadComponent('quem-somos-placeholder', 'html/quem_somos_section.html');
    </script>
</body>
</html>
